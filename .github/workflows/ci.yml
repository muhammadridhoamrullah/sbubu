name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend-sbubu
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sbubu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Deteksi perubahan di folder backend-sbubu
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend-sbubu/**'

      - name: Setup Node.js
        if: steps.filter.outputs.backend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend-sbubu/package-lock.json

      - name: Install dependencies
        if: steps.filter.outputs.backend == 'true'
        run: npm ci

      - name: Cek build Docker image (tanpa push)
        if: steps.filter.outputs.backend == 'true'
        run: docker build -t backend-sbubu-test .

  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-sbubu
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Deteksi perubahan di folder frontend-sbubu
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend-sbubu/**'

      - name: Setup Node.js
        if: steps.filter.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-sbubu/package-lock.json

      - name: Install dependencies
        if: steps.filter.outputs.frontend == 'true'
        run: npm ci

      - name: Build (memastikan Vite build sukses)
        if: steps.filter.outputs.frontend == 'true'
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_STAGING }}
